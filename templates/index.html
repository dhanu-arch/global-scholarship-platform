<!DOCTYPE html>
<html>

<head>

<title>Global Scholarship Platform</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h1 class="text-center text-primary">
Global Scholarship Finder
</h1>

<p class="text-center">
Find higher education scholarships worldwide
</p>

<form method="post" class="mt-4">

<div class="row">

<div class="col-md-6">
<input
type="text"
name="search"
class="form-control"
placeholder="Search scholarships, countries or fields"
>
</div>

<div class="col-md-3">
<select name="country" class="form-control">

<option value="">All Countries</option>
<option>USA</option>
<option>UK</option>
<option>Germany</option>
<option>Japan</option>
<option>Europe</option>

</select>
</div>

<div class="col-md-3">
<button class="btn btn-primary w-100">
Search
</button>
</div>

</div>

</form>

<hr>

<div class="row">

{% for s in scholarships %}

<div class="col-md-4 mt-4">

<div class="card shadow">

<div class="card-body">

<h5 class="card-title">
{{s.name}}
</h5>

<p>
Country: {{s.country}}
</p>

<p>
Field: {{s.field}}
</p>

<p>
Level: {{s.level}}
</p>

<a
href="{{s.link}}"
target="_blank"
class="btn btn-success"
>
Apply on Official Website
</a>

</div>

</div>

</div>

{% endfor %}

</div>

</div>

</body>

</html>
